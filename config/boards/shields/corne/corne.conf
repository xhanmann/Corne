# RGB Underglow (nRF52840)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# OLED Display (nRF52840)
CONFIG_ZMK_DISPLAY=y
CONFIG_I2C=y
CONFIG_I2C_0=y

# SSD1306 OLED Driver
CONFIG_SSD1306=y
CONFIG_SSD1306_I2C=y
CONFIG_SSD1306_128X32=y
CONFIG_SSD1306_I2C_ADDRESS=0x3c

# RGB Configuration
CONFIG_ZMK_RGB_UNDERGLOW_WS2812_COUNT=42
CONFIG_ZMK_RGB_UNDERGLOW_BRIGHTNESS=200
CONFIG_ZMK_RGB_UNDERGLOW_EFFECT_RAINBOW=y
